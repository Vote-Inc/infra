server {
    listen 8080;

    location = /health {
        access_log off;
        return 200 'ok';
        add_header Content-Type text/plain;
    }

    location = /api/auth/validate {
        internal;
        proxy_pass              http://127.0.0.1:8081;
        proxy_pass_request_body off;
        proxy_set_header        Content-Length "";
        proxy_set_header        X-Original-URI $request_uri;
        proxy_set_header        Authorization "Bearer $cookie_token";
    }

    location /api/auth/ {
        proxy_pass          http://127.0.0.1:8081;
        proxy_set_header    Host              $host;
        proxy_set_header    X-Real-IP         $remote_addr;
        proxy_set_header    X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header    Authorization     $http_authorization;
    }

    location /api/ballots {
        auth_request     /api/auth/validate;
        auth_request_set $voter_id   $upstream_http_x_voter_id;
        auth_request_set $voter_role $upstream_http_x_voter_role;

        proxy_pass          http://127.0.0.1:8082;
        proxy_set_header    Host         $host;
        proxy_set_header    X-Voter-Id   $voter_id;
        proxy_set_header    X-Voter-Role $voter_role;

        error_page 401 = @unauthorized;
    }

    location = /api/votes/verify {
        limit_req        zone=verify_limit burst=5 nodelay;
        limit_req_status 429;

        proxy_pass       http://127.0.0.1:8083;
        proxy_set_header Host $host;

        error_page 429 = @rate_limited;
    }

    location /api/votes {
        auth_request     /api/auth/validate;
        auth_request_set $voter_id   $upstream_http_x_voter_id;
        auth_request_set $voter_role $upstream_http_x_voter_role;

        proxy_pass          http://127.0.0.1:8083;
        proxy_set_header    Host         $host;
        proxy_set_header    X-Voter-Id   $voter_id;
        proxy_set_header    X-Voter-Role $voter_role;

        error_page 401 = @unauthorized;
    }

    location ~ ^/(login|_next/) {
        proxy_pass          http://127.0.0.1:3000;
        proxy_set_header    Host            $host;
        proxy_set_header    X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_http_version  1.1;
        proxy_set_header    Upgrade         $http_upgrade;
        proxy_set_header    Connection      "upgrade";
    }

    location / {
        auth_request     /api/auth/validate;
        auth_request_set $voter_id   $upstream_http_x_voter_id;
        auth_request_set $voter_role $upstream_http_x_voter_role;

        proxy_pass          http://127.0.0.1:3000;
        proxy_set_header    Host              $host;
        proxy_set_header    X-Voter-Id        $voter_id;
        proxy_set_header    X-Voter-Role      $voter_role;
        proxy_set_header    X-Forwarded-For   $proxy_add_x_forwarded_for;

        proxy_http_version  1.1;
        proxy_set_header    Upgrade    $http_upgrade;
        proxy_set_header    Connection "upgrade";

        error_page 401 = @unauthorized_redirect;
    }

    location @unauthorized {
        default_type application/json;
        return 401 '{"error":"Unauthorized","message":"A valid JWT is required."}';
    }

    location @unauthorized_redirect {
        return 302 /login;
    }

    location @rate_limited {
        default_type application/json;
        return 429 '{"error":"TooManyRequests","message":"Too many requests, please try again later."}';
    }
}